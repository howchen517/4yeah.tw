<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四葉草 Game Store</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* --- 基礎設定與色彩計畫 --- */
        :root {
            --primary-color: #6AAB73; /* 四葉草綠 */
            --primary-light: #EAF4EB;
            --bg-color: #F6FBF6;
            --text-main: #333333;
            --text-muted: #888888;
            --card-bg: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #EFEFEF; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 400px; min-height: 100vh; background-color: var(--bg-color);
            position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); overflow-x: hidden;
        }

        .page { display: none; padding-bottom: 100px; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 頂部導覽列 --- */
        .header { padding: 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        .header h1 { font-size: 18px; color: var(--text-main); font-weight: 600; }
        .back-btn { position: absolute; left: 20px; font-size: 24px; color: var(--text-main); cursor: pointer; }

        /* --- 首頁樣式 --- */
        .welcome-card { margin: 0 20px 20px; background-color: var(--primary-light); border: 2px solid var(--primary-color); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; }
        .welcome-text h2 { font-size: 16px; color: var(--text-main); margin-bottom: 4px; }
        .welcome-text p { font-size: 13px; color: var(--primary-color); font-weight: 500; }
        
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 0 20px; margin-bottom: 30px; }
        .game-card { background: var(--card-bg); border-radius: 16px; padding: 15px 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: scale(0.95); }
        .game-icon { width: 50px; height: 50px; background-color: #EEE; border-radius: 12px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .game-name { font-size: 12px; color: var(--text-main); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } /* 避免名稱太長破版 */

        /* --- 底部導覽列 --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 400px; background: var(--card-bg);
            display: flex; justify-content: space-around; padding: 12px 0 25px;
            border-top: 1px solid #F0F0F0; border-radius: 20px 20px 0 0; z-index: 999;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 11px; gap: 4px; }
        .nav-item.active { color: var(--primary-color); }
        .nav-item i { font-size: 24px; }

        /* --- 遊戲下單頁面樣式 --- */
        .game-header { text-align: center; padding: 10px 20px 20px; }
        .game-header .big-icon { font-size: 48px; margin-bottom: 10px; }
        .section-title { font-size: 14px; font-weight: bold; color: var(--text-main); margin: 20px 20px 10px; display: flex; align-items: center; gap: 6px; }
        .section-title i { color: var(--primary-color); font-size: 18px; }

        .input-group { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .input-field { width: 100%; padding: 14px 16px; border-radius: 16px; border: 2px solid #EAEAEA; background: var(--card-bg); font-size: 14px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: var(--primary-color); background: var(--primary-light); }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px; margin-bottom: 20px; }
        .product-card { background: var(--card-bg); border: 2px solid #EAEAEA; border-radius: 16px; padding: 16px 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .product-card.selected { border-color: var(--primary-color); background: var(--primary-light); }
        .product-name { font-size: 14px; font-weight: bold; color: var(--text-main); margin-bottom: 6px; }
        .product-price { font-size: 16px; color: var(--primary-color); font-weight: 800; }

        .checkout-bar { 
            position: fixed; bottom: 0; width: 100%; max-width: 400px; background: var(--card-bg); 
            padding: 15px 20px 25px; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); 
            display: flex; justify-content: space-between; align-items: center; z-index: 999;
        }
        .total-price { display: flex; flex-direction: column; }
        .total-price span { font-size: 12px; color: var(--text-muted); }
        .total-price strong { font-size: 20px; color: var(--primary-color); }
        .btn-submit { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 20px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(106, 171, 115, 0.3); }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="home-page" class="page active">
        <header class="header"><h1>Clover Game Store</h1></header>

        <section class="welcome-card">
            <div class="welcome-text">
                <h2>歡迎來到四葉草！</h2>
                <p>幸運代儲，快速到帳 🍀</p>
            </div>
            <div style="font-size: 40px;">🧚‍♂️</div>
        </section>

        <section class="game-grid">
            <div class="game-card" onclick="openGamePage('aov', '傳說對決', '🛡️')">
                <div class="game-icon">🛡️</div><div class="game-name">傳說對決</div>
            </div>
            <div class="game-card" onclick="openGamePage('codm', '決勝時刻', '🎯')">
                <div class="game-icon">🎯</div><div class="game-name">決勝時刻</div>
            </div>
            <div class="game-card" onclick="openGamePage('pubg', 'PUBGM', '🪂')">
                <div class="game-icon">🪂</div><div class="game-name">PUBGM</div>
            </div>
            <div class="game-card" onclick="openGamePage('heartbeat', '心動小鎮', '🏡')">
                <div class="game-icon">🏡</div><div class="game-name">心動小鎮</div>
            </div>
            <div class="game-card" onclick="openGamePage('supernatural', '超自然行動組', '👻')">
                <div class="game-icon">👻</div><div class="game-name">超自然行動</div>
            </div>
            <div class="game-card" onclick="openGamePage('maplestory', '楓之谷', '🍁')">
                <div class="game-icon">🍁</div><div class="game-name">楓之谷</div>
            </div>
            <div class="game-card" onclick="openGamePage('pkmngo', 'Pokémon GO', '🧭')">
                <div class="game-icon">🧭</div><div class="game-name">Pokémon GO</div>
            </div>
            <div class="game-card" onclick="openGamePage('idv', '第五人格', '🎭')">
                <div class="game-icon">🎭</div><div class="game-name">第五人格</div>
            </div>
            <div class="game-card" onclick="openGamePage('valorant', '特戰英豪', '💥')">
                <div class="game-icon">💥</div><div class="game-name">特戰英豪</div>
            </div>
            <div class="game-card" onclick="openGamePage('tiktok', 'TikTok', '🎵')">
                <div class="game-icon">🎵</div><div class="game-name">TikTok</div>
            </div>
            <div class="game-card" onclick="openGamePage('racing', '巔峰極速', '🏎️')">
                <div class="game-icon">🏎️</div><div class="game-name">巔峰極速</div>
            </div>
            <div class="game-card" onclick="openGamePage('deepspace', '戀與深空', '🌌')">
                <div class="game-icon">🌌</div><div class="game-name">戀與深空</div>
            </div>
            <div class="game-card" onclick="openGamePage('hok', '王者榮耀', '👑')">
                <div class="game-icon">👑</div><div class="game-name">王者榮耀</div>
            </div>
            <div class="game-card" onclick="openGamePage('genshin', '原神', '✨')">
                <div class="game-icon">✨</div><div class="game-name">原神</div>
            </div>
            <div class="game-card" onclick="openGamePage('wuthering', '鳴潮', '🌊')">
                <div class="game-icon">🌊</div><div class="game-name">鳴潮</div>
            </div>
            <div class="game-card" onclick="openGamePage('ptcg', 'PTCG', '🎴')">
                <div class="game-icon">🎴</div><div class="game-name">PTCG</div>
            </div>
            <div class="game-card" onclick="openGamePage('eggy', '蛋仔派對', '🥚')">
                <div class="game-icon">🥚</div><div class="game-name">蛋仔派對</div>
            </div>
            <div class="game-card" onclick="openGamePage('wherewindsmeet', '燕雲十六聲', '🎋')">
                <div class="game-icon">🎋</div><div class="game-name">燕雲十六聲</div>
            </div>
            <div class="game-card" onclick="openGamePage('justice', '逆水寒', '🏮')">
                <div class="game-icon">🏮</div><div class="game-name">逆水寒</div>
            </div>
        </section>
    </div>

    <div id="game-page" class="page">
        <header class="header">
            <i class="ph ph-caret-left back-btn" onclick="goBackToHome()"></i>
            <h1 id="page-game-title">遊戲名稱</h1>
        </header>

        <div class="game-header">
            <div class="big-icon" id="page-game-icon">🎮</div>
        </div>

        <div class="section-title"><i class="ph-fill ph-user-circle"></i> 填寫角色資訊</div>
        <div class="input-group">
            <input type="text" class="input-field" id="player-id" placeholder="請輸入您的遊戲 ID / 帳號">
            <input type="text" class="input-field" id="player-server" placeholder="請填寫伺服器 (若無則免填)">
        </div>

        <div class="section-title"><i class="ph-fill ph-shopping-bag"></i> 選擇代儲方案</div>
        <div class="product-grid" id="product-list">
            </div>

        <div class="checkout-bar" id="checkout-bar" style="display: none;">
            <div class="total-price">
                <span>合計金額</span>
                <strong id="display-total">NT$ 0</strong>
            </div>
            <button class="btn-submit" onclick="submitOrder()">確認下單</button>
        </div>
    </div>

    <nav class="bottom-nav" id="main-nav">
        <a href="#" class="nav-item active">
            <i class="ph-fill ph-house"></i>
            <span>首頁</span>
        </a>
        <a href="#" class="nav-item">
            <i class="ph ph-receipt"></i>
            <span>我的訂單</span>
        </a>
        <a href="#" class="nav-item">
            <i class="ph ph-user"></i>
            <span>個人中心</span>
        </a>
    </nav>

</div>

<script>
    // --- 擴充的商品資料庫 (這裡放了預設的測試方案) ---
    const defaultProducts = [
        { id: 'p1', name: '基本禮包', price: 150 },
        { id: 'p2', name: '超值月卡', price: 330 },
        { id: 'p3', name: '進階通行證', price: 690 },
        { id: 'p4', name: '尊榮大禮包', price: 1490 }
    ];

    // 為所有遊戲配置商品，您可以依照實際需求修改價格
    const gameProducts = {
        'aov': [{ name: '100 點券', price: 50 }, { name: '1200 點券', price: 600 }],
        'codm': [{ name: '80 CP', price: 30 }, { name: '800 CP', price: 300 }],
        'genshin': [{ name: '空月祝福', price: 170 }, { name: '3280 創世結晶', price: 1490 }],
        // 如果沒有特別指定的遊戲，就會自動帶入 defaultProducts
    };

    let selectedPrice = 0;
    let selectedProductName = "";

    function openGamePage(gameId, gameName, gameIcon) {
        document.getElementById('page-game-title').innerText = gameName;
        document.getElementById('page-game-icon').innerText = gameIcon;
        document.getElementById('player-id').value = '';
        document.getElementById('player-server').value = '';
        updateTotal(0, "");
        
        renderProducts(gameId);

        document.getElementById('home-page').classList.remove('active');
        document.getElementById('game-page').classList.add('active');
        document.getElementById('main-nav').style.display = 'none'; 
        document.getElementById('checkout-bar').style.display = 'flex'; 
        
        // 確保切換頁面時，畫面回到最頂端
        window.scrollTo(0, 0); 
    }

    function goBackToHome() {
        document.getElementById('game-page').classList.remove('active');
        document.getElementById('home-page').classList.add('active');
        document.getElementById('main-nav').style.display = 'flex'; 
        document.getElementById('checkout-bar').style.display = 'none'; 
    }

    function renderProducts(gameId) {
        const productContainer = document.getElementById('product-list');
        productContainer.innerHTML = ''; 
        // 如果特定遊戲沒有設定價目表，就套用 defaultProducts
        const products = gameProducts[gameId] || defaultProducts;
        
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-name">${product.name}</div>
                <div class="product-price">NT$ ${product.price}</div>
            `;
            card.onclick = function() {
                const allCards = document.querySelectorAll('.product-card');
                allCards.forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                updateTotal(product.price, product.name);
            };
            productContainer.appendChild(card);
        });
    }

    function updateTotal(price, name) {
        selectedPrice = price;
        selectedProductName = name;
        document.getElementById('display-total').innerText = `NT$ ${price}`;
    }

    function submitOrder() {
        const uid = document.getElementById('player-id').value;
        const server = document.getElementById('player-server').value;
        const gameName = document.getElementById('page-game-title').innerText;

        if (!uid) { alert("請輸入您的遊戲 ID / 帳號！🍀"); return; }
        if (selectedPrice === 0) { alert("請選擇一個代儲方案！🍀"); return; }

        const confirmMsg = `🍀 訂單確認 🍀\n\n遊戲：${gameName}\n帳號：${uid}\n伺服器：${server || '未填寫'}\n購買方案：${selectedProductName}\n總金額：NT$ ${selectedPrice}\n\n確認無誤將送出訂單！`;
        
        if (confirm(confirmMsg)) {
            alert("訂單已成功建立！");
            // 接下來可以在這裡接 liff.sendMessages() 
        }
    }
</script>

</body>
</html>
